# Embeddings API schemas

EmbeddingRequest:
  type: object
  required:
    - model
    - input
  properties:
    model:
      type: string
      description: Model in provider/model format (e.g. "openai/text-embedding-3-small")
    input:
      $ref: '#/EmbeddingInput'
    fallbacks:
      type: array
      items:
        type: string
      description: Fallback models in provider/model format
    encoding_format:
      type: string
      enum: [float, base64]
      description: Format for embedding output (OpenAI)
    dimensions:
      type: integer
      description: Number of output dimensions
    task_type:
      type: string
      description: >
        Intended downstream task hint. Supported by Gemini and Vertex text embedding models
        (e.g. RETRIEVAL_DOCUMENT, RETRIEVAL_QUERY, SEMANTIC_SIMILARITY, CLASSIFICATION,
        CLUSTERING, QUESTION_ANSWERING, FACT_VERIFICATION, CODE_RETRIEVAL_QUERY).
    title:
      type: string
      description: >
        Optional title for the content. Used by Gemini / Vertex when task_type is
        RETRIEVAL_DOCUMENT to improve retrieval quality.
    auto_truncate:
      type: boolean
      description: >
        Automatically truncate long inputs. Supported by Vertex text embedding models
        (default true) and Vertex Gemini embedding models.

BatchEmbeddingRequest:
  type: object
  required:
    - model
    - items
  properties:
    model:
      type: string
      description: Model in provider/model format
    items:
      type: array
      items:
        $ref: '#/EmbeddingBatchItem'
      description: >
        List of embedding inputs. Each item may carry its own params override;
        omit item-level params to inherit the top-level defaults.
    fallbacks:
      type: array
      items:
        type: string
    encoding_format:
      type: string
      enum: [float, base64]
    dimensions:
      type: integer
      description: Default output dimensions for all items
    task_type:
      type: string
      description: Default task type for all items
    title:
      type: string
      description: Default title for all items
    auto_truncate:
      type: boolean
      description: Default auto-truncate setting for all items

EmbeddingBatchItem:
  type: object
  required:
    - content
  properties:
    content:
      $ref: '#/EmbeddingContent'
    params:
      $ref: '#/EmbeddingItemParams'
      description: Per-item parameter overrides; null inherits batch-level defaults

EmbeddingItemParams:
  type: object
  description: Per-item parameter overrides within a batch request
  properties:
    encoding_format:
      type: string
      enum: [float, base64]
    dimensions:
      type: integer
    task_type:
      type: string
    title:
      type: string
    auto_truncate:
      type: boolean

# EmbeddingInput accepts three shapes:
#   1. Single text string shorthand
#   2. Array of text strings shorthand
#   3. Full multimodal form — array of EmbeddingContent (each an array of typed parts)
EmbeddingInput:
  oneOf:
    - type: string
      description: Single text string shorthand
    - type: array
      items:
        type: string
      description: Multiple text strings shorthand
    - type: array
      items:
        $ref: '#/EmbeddingContent'
      description: >
        Full multimodal form. Each element is one EmbeddingContent (a list of typed
        parts that together produce one output embedding vector).
  description: >
    Input for embedding. Accepts a single text string, an array of text strings, or the
    full multimodal form (array of EmbeddingContent). The multimodal form is required for
    image, audio, video, file, or token inputs.

# EmbeddingContent is a list of typed parts that together produce one embedding vector.
# Most providers accept only a single part per content entry.
EmbeddingContent:
  type: array
  items:
    $ref: '#/EmbeddingContentPart'
  minItems: 1
  description: >
    A list of typed content parts that are combined into one embedding vector.
    Text-only providers (OpenAI, Cohere texts path) accept multiple text parts
    that are concatenated. Multimodal providers (Gemini, Vertex, Cohere inputs path)
    accept mixed-modality parts.

EmbeddingContentPart:
  type: object
  required:
    - type
  properties:
    type:
      type: string
      enum: [text, image, audio, file, video, tokens]
      description: Modality of this content part
    text:
      type: string
      description: Text payload — required when type is "text"
    image:
      $ref: '#/EmbeddingMediaPart'
      description: Image payload — required when type is "image"
    audio:
      $ref: '#/EmbeddingMediaPart'
      description: Audio payload — required when type is "audio"
    file:
      $ref: '#/EmbeddingMediaPart'
      description: File payload — required when type is "file"
    video:
      $ref: '#/EmbeddingMediaPart'
      description: Video payload — required when type is "video"
    video_config:
      $ref: '#/EmbeddingVideoConfig'
      description: >
        Optional video segment parameters. Only meaningful when type is "video" and the
        provider supports per-segment embeddings (Vertex multimodalembedding@001).
    tokens:
      type: array
      items:
        type: integer
      description: Pre-tokenised integer token IDs — required when type is "tokens" (OpenAI only)
  description: >
    Exactly one of text / image / audio / file / video / tokens must be set,
    matching the declared type.

EmbeddingMediaPart:
  type: object
  description: >
    Media payload for image, audio, file, or video parts.
    Exactly one of data or url must be provided.
  properties:
    data:
      type: string
      description: >
        Base64-encoded media data, optionally as a data URI
        (data:<mime>;base64,<data>). Used for inline uploads.
    url:
      type: string
      description: >
        URL pointing to the media. For Vertex multimodal embeddings this must be
        a GCS URI (gs://…). For Gemini this can be any accessible URL.
    mime_type:
      type: string
      description: >
        MIME type of the media (e.g. "image/jpeg", "audio/mpeg", "video/mp4").
        Optional when the type can be inferred from a data URI or file extension.
    filename:
      type: string
      description: Original filename, used as display name in Gemini File API uploads.

EmbeddingVideoConfig:
  type: object
  description: >
    Optional video segment parameters for Vertex multimodalembedding@001.
    Controls which portion of the video is sampled and the interval between
    per-segment embeddings.
  properties:
    start_offset_sec:
      type: integer
      description: Start of the sampling window in seconds
    end_offset_sec:
      type: integer
      description: End of the sampling window in seconds
    interval_sec:
      type: integer
      description: >
        Interval between consecutive segment embeddings in seconds (minimum 4).
        When set, the model returns multiple EmbeddingData entries, one per segment.

EmbeddingResponse:
  type: object
  properties:
    data:
      type: array
      items:
        $ref: '#/EmbeddingData'
      description: >
        List of embedding vectors. For standard providers this has one entry per
        input content. For Vertex multimodalembedding@001 it may have multiple
        entries per input (one per modality, plus one per video segment).
    model:
      type: string
    object:
      type: string
      example: list
    usage:
      $ref: './usage.yaml#/BifrostLLMUsage'
    extra_fields:
      $ref: './common.yaml#/BifrostResponseExtraFields'

EmbeddingData:
  type: object
  properties:
    index:
      type: integer
      description: Position of this embedding in the output list
    object:
      type: string
      example: embedding
    modality:
      type: string
      enum: [text, image, video, audio]
      description: >
        Which input modality produced this vector. Only set for providers that return
        separate vectors per modality (Vertex multimodalembedding@001). Empty for
        providers that return a single unified vector.
    video_segment:
      $ref: '#/EmbeddingVideoSegment'
      description: >
        Time range of the video segment that produced this embedding.
        Only present when modality is "video" and the provider returned
        per-segment embeddings.
    embedding:
      $ref: '#/EmbeddingsByType'

EmbeddingVideoSegment:
  type: object
  description: Time range of a video segment embedding (Vertex multimodalembedding@001 only)
  properties:
    start_offset_sec:
      type: integer
    end_offset_sec:
      type: integer

EmbeddingsByType:
  type: object
  description: >
    Embedding vectors keyed by numeric type. Typically only one field is populated per
    response entry. Cohere embed-v4 can return multiple types simultaneously when
    embedding_types is specified via extra_params.
  properties:
    float:
      type: array
      items:
        type: number
        format: float
      description: Full-precision float embeddings (default for most providers)
    int8:
      type: array
      items:
        type: integer
        format: int8
      description: Int8 quantised embeddings (Cohere embed-v4)
    uint8:
      type: array
      items:
        type: integer
        format: uint8
      description: Uint8 quantised embeddings (Cohere embed-v4)
    binary:
      type: array
      items:
        type: integer
        format: int8
      description: Binary embeddings packed as int8 (Cohere embed-v4)
    ubinary:
      type: array
      items:
        type: integer
        format: uint8
      description: Unsigned binary embeddings packed as uint8 (Cohere embed-v4)
    base64:
      type: string
      description: >
        Base64-encoded float embeddings (OpenAI encoding_format=base64).
        Clients must decode this string to obtain the float vector.
